# -----------------------------------------------------------------------------
# Main
# -----------------------------------------------------------------------------
log-level: silent # silent, debug

mode: rule
ipv6: false
allow-lan: true
keep-alive-interval: 30

enable-process: true
find-process-mode: always

# Делать задержки более естественными (чтобы не выдавать автоматизацию)
# Повышение точности тестирования скорости прокси-серверов
# Рекомендуется держать включённым для стабильной работы
unified-delay: true

profile:
  store-selected: true
  store-fake-ip: true

# -----------------------------------------------------------------------------
# DNS
# -----------------------------------------------------------------------------
dns:
  enable: true
  ipv6: false
  listen: 127.0.0.1:6868

  # Использование локальных сопоставлений domain -> ip
  use-hosts: true  
  # Использование системных сопоставлений domain -> ip
  use-system-hosts: true

  # Серверы для резолва доменов самих прокси-серверов
  default-nameserver:
    - system

  # Серверы для доменов, не попадающих ни под какие правила
  nameserver:
    - system

  # Серверы для доменов, попадающих под DIRECT-правила
  direct-nameserver:
    - system

  # Серверы для доменов, попадающих под PROXY-правила
  proxy-server-nameserver:
    - https://dns.cloudflare.com/dns-query#proxy=PROXY

  proxy-server-nameserver-policy:
    rule-set:geosite-youtube:
      - https://mozilla.cloudflare-dns.com/dns-query#proxy=PROXY

  # Резервные серверы разрешения доменных имен
  fallback:
    - https://freedns.controld.com/p1#proxy=PROXY

  fallback-filter:
    geoip: true
    geoip-code: RU
    ipcidr:
      - 0.0.0.0/32
      - 127.0.0.0/8
      - 240.0.0.0/4

  # Режим работы DNS:
  # redir-host — возврат реальных IP (лучше для совместимости с белым списком);
  # fake-ip — возврат виртуальных IP из пула (быстрее, но может обнаруживаться приложениями).
  enhanced-mode: redir-host
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - stun.*.*.*
    - stun.*.*
    - time.windows.com
    - time.nist.gov
    - time.apple.com
    - time.asia.apple.com
    - "*.openwrt.pool.ntp.org"
    - pool.ntp.org
    - ntp.ubuntu.com
    - time1.apple.com
    - time2.apple.com
    - time3.apple.com
    - time4.apple.com
    - time5.apple.com
    - time6.apple.com
    - time7.apple.com
    - api.joox.com
    - joox.com
    - "*.xiami.com"
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"
    - "+.xboxlive.com"
    - "*.*.stun.playstation.net"
    - xbox.*.*.microsoft.com
    - "*.ipv6.microsoft.com"
    - speedtest.cros.wr.pvp.net

# -----------------------------------------------------------------------------
# Tun
# -----------------------------------------------------------------------------
tun:
  enable: true
  stack: mixed
  device: mihomo
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  dns-hijack:
    - any:53
  exclude-address:
    - 0.0.0.0/8
    - 10.0.0.0/8
    - 100.64.0.0/10
    - 127.0.0.0/8
    - 169.254.0.0/16
    - 172.16.0.0/12
    - 192.0.0.0/24
    - 192.0.2.0/24
    - 192.88.99.0/24
    - 192.168.0.0/16
    - 198.51.100.0/24
    - 203.0.113.0/24
    - 224.0.0.0/3
    - ::1/127
    - fc00::/7
    - fe80::/10
    - ff00::/8

# -----------------------------------------------------------------------------
# Sniffer
# -----------------------------------------------------------------------------

# Функция "подслушивания" трафика для определения доменных имён
# Позволяет корректно маршрутизировать трафик даже при подключении по IP-адресу
# Критически важно для работы правил на основе доменных имён
sniffer:
  enable: true    # Включить сниффер
  parse-pure-ip: true    # Анализировать IP-адреса без домена
  force-dns-mapping: true    # Принудительно использовать DNS-маппинг
  sniff:    # Настройки для различных протоколов
    HTTP:
      ports: [80, 8080-8880]    # Порты для HTTP-трафика
      override-destination: true    # Подменять получателя трафика на домен
    TLS:
      ports: [443, 8443]    # Порты для HTTPS/TLS-трафика
    QUIC:
      ports: [443, 8443]    # Порты для QUIC-протокола (UDP/443)

# -----------------------------------------------------------------------------
# Proxies
# -----------------------------------------------------------------------------
proxies: # LEAVE THIS LINE!

# -----------------------------------------------------------------------------
# Proxy groups
# -----------------------------------------------------------------------------
# Иконки
icon_random: &icon_random https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Round_Robin.png
icon_rocket: &icon_rocket https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Rocket.png
icon_youtube: &icon_youtube https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/YouTube.png

# Регулярное выражение для исключения российских прокси
exclude_ru: &exclude_ru "(?i)🇷🇺|RU|Россия"

# Конфигурация URL-тестирования для выбора fastest-прокси
# Используется для url-test-групп (автоматический выбор по скорости)
url_test: &url_test
  url: http://www.gstatic.com/generate_204
  interval: 300
  lazy: false           # Тестирование при запуске
  expected-status: 204
  tolerance: 50         # Допустимая разница задержки (мс)

url_fallback: &url_fallback
  url: http://www.gstatic.com/generate_204
  interval: 600

proxy-groups:
  - name: REMNAWAVE
    icon: *icon_random
    type: select
    exclude-filter: *exclude_ru
    proxies: # LEAVE THIS LINE!

  - name: FALLBACK
    <<: *url_fallback
    type: fallback
    hidden: true
    include-all: true
    remnawave:
      include-proxies: false
    proxies: # LEAVE THIS LINE!

  - name: FASTEST
    <<: *url_test
    icon: *icon_rocket
    type: url-test
    hidden: true
    include-all: true
    remnawave:
      include-proxies: false
    proxies: # LEAVE THIS LINE!

  - name: PROXY
    type: select
    remnawave:
      include-proxies: false
    proxies:
      - REMNAWAVE
      - FASTEST
      - FALLBACK

  - name: YOUTUBE
    icon: *icon_youtube
    type: select
    remnawave:
      include-proxies: false
    proxies:
      - FASTEST
      - PROXY

# -----------------------------------------------------------------------------
# Rule provider bases
# -----------------------------------------------------------------------------

rule_provider_base: &rule_provider_base
  type: http    # Тип: HTTP (скачивать из интернета)
  interval: 86400    # Интервал обновления: 24 часа

rule_behavior_domain_mrs: &rule_behavior_domain_mrs
  <<: *rule_provider_base
  behavior: domain    # Тип правила: домены
  format: mrs    # Формат: Meta Ruleset

rule_behavior_ipcidr_mrs: &rule_behavior_ipcidr_mrs
  <<: *rule_provider_base
  behavior: ipcidr    # Тип правила: IP-диапазоны
  format: mrs    # Формат: Meta Ruleset

# Специальный шаблон для классических правил (torrent-clients)
rule_behavior_classical_yaml: &rule_behavior_classical_yaml
  <<: *rule_provider_base
  behavior: classical    # Тип правила: классический
  format: yaml    # Формат: YAML

# -----------------------------------------------------------------------------
# Rule providers
# -----------------------------------------------------------------------------
rule-providers:
  apps-direct:
    <<: *rule_behavior_classical_yaml
    url: https://github.com/aligotr/rule-set-ru/releases/latest/download/apps_windows_direct_mihomo.yaml
    path: ./rules/apps_windows_direct_mihomo.yaml

  geoip-direct:
    <<: *rule_behavior_ipcidr_mrs
    url: https://github.com/aligotr/rule-set-ru/releases/latest/download/geoip_direct.mrs
    path: ./rules/geoip_direct.mrs

  geosite-direct:
    <<: *rule_behavior_domain_mrs
    url: https://github.com/aligotr/rule-set-ru/releases/latest/download/geosite_direct.mrs
    path: ./rules/geosite_direct.mrs

  apps-proxy:
    <<: *rule_behavior_classical_yaml
    url: https://github.com/aligotr/rule-set-ru/releases/latest/download/apps_windows_proxy_mihomo.yaml
    path: ./rules/apps_windows_proxy_mihomo.yaml

  geoip-proxy:
    <<: *rule_behavior_ipcidr_mrs
    url: https://github.com/aligotr/rule-set-ru/releases/latest/download/geoip_proxy.mrs
    path: ./rules/geoip_proxy.mrs

  geosite-proxy:
    <<: *rule_behavior_domain_mrs
    url: https://github.com/aligotr/rule-set-ru/releases/latest/download/geosite_proxy.mrs
    path: ./rules/geosite_proxy.mrs

  geosite-bitwarden:
    <<: *rule_behavior_domain_mrs
    url: https://github.com/aligotr/rule-set-ru/releases/latest/download/geosite_bitwarden.mrs
    path: ./rules/geosite_bitwarden.mrs

  geosite-youtube:
    <<: *rule_behavior_domain_mrs
    url: https://github.com/aligotr/rule-set-ru/releases/latest/download/geosite_youtube.mrs
    path: ./rules/geosite_youtube.mrs

# -----------------------------------------------------------------------------
# Rules
# -----------------------------------------------------------------------------
rules:
# 🏠 Локальная сеть
  - GEOIP,PRIVATE,DIRECT,no-resolve
  - GEOSITE,PRIVATE,DIRECT

# 🚫 BLOCK ---------------------------------------------------------------------
  # HTTP3/QUIC
  - AND,((NETWORK,udp),(DST-PORT,443)),REJECT

  # Windows NetBIOS/SMB
  - AND,((NETWORK,udp),(DST-PORT,135,137-139)),REJECT

# Tests ------------------------------------------------------------------------
  - OR,((DOMAIN-SUFFIX,myip.com),(DOMAIN-SUFFIX,dnsleaktest.com)),PROXY
  - OR,((DOMAIN-SUFFIX,2ip.io),(DOMAIN-SUFFIX,ip.sb),(DOMAIN-SUFFIX,ipip.net),(DOMAIN-SUFFIX,ipwho.is)),PROXY

# ➡️ DIRECT --------------------------------------------------------------------
  - RULE-SET,apps-direct,DIRECT # 📦 Процессы
  - RULE-SET,geoip-direct,DIRECT
  - RULE-SET,geosite-direct,DIRECT
  - RULE-SET,geosite-bitwarden,DIRECT

# 🔁 PROXY ---------------------------------------------------------------------
  - RULE-SET,geosite-youtube,YOUTUBE
  - RULE-SET,apps-proxy,PROXY # 📦 Процессы
  - RULE-SET,geoip-proxy,PROXY
  - RULE-SET,geosite-proxy,PROXY

# 🏁 FINAL ---------------------------------------------------------------------
  - MATCH,DIRECT
